name: ApexFood CI/CD - Main Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AZURE_RESOURCE_GROUP_NAME: rg-apexfood-dev
  AZURE_LOCATION: "Brazil South"
  AZURE_WEBAPP_NAME: app-apexfood-dev

jobs:
  build_and_test:
    name: Build, Test and Package
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --no-build --verbosity normal

    # ==================================================================
    # PASSO CORRIGIDO: Garante que o projeto correto seja publicado.
    # Note o caminho corrigido para 'ApexFood.Api/ApexFood.Api.csproj'
    # ==================================================================
    - name: Publish application
      run: dotnet publish ApexFood.Api/ApexFood.Api.csproj --configuration Release --output ./publish

    # ==================================================================
    # PASSO CORRIGIDO: Garante que o artefato seja carregado com o nome correto.
    # ==================================================================
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: apexfood-api-package # <-- NOME EXATO E CORRETO
        path: ./publish

  deploy:
    name: Provision and Deploy to Azure
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: apexfood-api-package
        path: ./publish

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # ==================================================================
    # PASSO DE DIAGNÓSTICO: Verifica se os segredos estão acessíveis.
    # Este passo falhará o pipeline imediatamente com uma mensagem clara se um
    # segredo estiver faltando, provando a causa raiz.
    # ==================================================================
    - name: 'Pre-flight Secrets Check'
      run: |
        if [ -z "${{ secrets.SQL_ADMIN_PASSWORD }}" ]; then echo "ERRO: O segredo SQL_ADMIN_PASSWORD está faltando ou vazio."; exit 1; fi
        if [ -z "${{ secrets.AD_ADMIN_LOGIN }}" ]; then echo "ERRO: O segredo AD_ADMIN_LOGIN está faltando ou vazio."; exit 1; fi
        if [ -z "${{ secrets.AD_ADMIN_SID }}" ]; then echo "ERRO: O segredo AD_ADMIN_SID está faltando ou vazio."; exit 1; fi
        echo "Verificação de segredos concluída com sucesso."

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy Bicep template
      uses: azure/arm-deploy@v1
      with:
        resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP_NAME }}
        template: ./infrastructure/main.bicep
        # ==================================================================
        # SEÇÃO CORRIGIDA: Usa os nomes de segredos padronizados.
        # ==================================================================
        parameters: |
          projectName=${{ env.AZURE_WEBAPP_NAME }}
          sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
          adAdminLogin='${{ secrets.AD_ADMIN_LOGIN }}'
          adAdminSid='${{ secrets.AD_ADMIN_SID }}'

    - name: Update Database
      run: |
        dotnet tool install --global dotnet-ef
        export PATH="$PATH:~/.dotnet/tools"
        dotnet ef database update \
          --project ApexFood.Persistence \
          --connection "${{ secrets.AZURE_DB_CONNECTION_STRING }}"

    - name: Deploy to App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: './publish'