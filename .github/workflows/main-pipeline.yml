#------------------------------------------------
  # Job 2: Provisionar Infraestrutura e Fazer Deploy (CORRIGIDO)
  #------------------------------------------------
  deploy:
    name: Provision and Deploy to Azure
    runs-on: ubuntu-latest
    
    # Dependência: Este job só começa se 'build_and_test' for concluído com sucesso.
    needs: build_and_test
    
    # Condição: Este job SÓ EXECUTA em um PUSH para a branch 'main'. Ele será pulado em Pull Requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    # ==================================================================
    # PASSO CORRIGIDO: Adicionado o checkout do código
    # ==================================================================
    - name: Checkout repository
      uses: actions/checkout@v4

    # Passo 1: Fazer o download do artefato gerado no job anterior.
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: apexfood-api-package
        path: ./publish

    # Passo 2: Fazer login no Azure usando a credencial que armazenamos no GitHub Secrets.
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Passo 3: Garantir que o Resource Group existe.
    - name: Create Resource Group
      uses: azure/cli@v1
      with:
        inlineScript: |
          az group create --name ${{ env.AZURE_RESOURCE_GROUP_NAME }} --location "${{ env.AZURE_LOCATION }}"
    
    # Passo 4: Provisionar/Atualizar a infraestrutura usando nosso arquivo Bicep.
    - name: Deploy Bicep template
      uses: azure/arm-deploy@v1
      with:
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }} # O ID da assinatura pode ser obtido do secret também
        resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP_NAME }}
        template: ./infrastructure/main.bicep
        parameters: 'projectName=${{ env.AZURE_WEBAPP_NAME }}' # Passa parâmetros para o Bicep

    # Passo 5: Fazer o deploy da aplicação para o Azure App Service.
    - name: Deploy to App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: './publish'