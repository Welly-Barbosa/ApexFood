name: ApexFood CI/CD - Main Pipeline


on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]


env:
AZURE_RESOURCE_GROUP_NAME: rg-apexfood-dev
AZURE_LOCATION: "Brazil South"
AZURE_WEBAPP_NAME: app-apexfood-dev


jobs:
build_and_test:
name: Build, Test and Package
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- name: Setup .NET
uses: actions/setup-dotnet@v3
with:
dotnet-version: '8.0.x'
- name: Restore
run: dotnet restore
- name: Build
run: dotnet build --no-restore --configuration Release
- name: Test
run: dotnet test --no-build --verbosity normal


deploy:
name: Provision and Deploy to Azure
runs-on: ubuntu-latest
needs: build_and_test
# Só executa deploy quando for push para main (evita falta de secrets em PRs de forks)
if: github.ref == 'refs/heads/main' && github.event_name == 'push'
steps:
- uses: actions/checkout@v4


- name: Login to Azure
uses: azure/login@v1
with:
creds: ${{ secrets.AZURE_CREDENTIALS }}


- name: Validate required secrets
run: |
if [ -z "${{ secrets.AZURE_SQL_PASSWORD }}" ]; then echo "ERROR: Missing secret AZURE_SQL_PASSWORD"; exit 1; fi
if [ -z "${{ secrets.AD_ADMIN_LOGIN }}" ]; then echo "ERROR: Missing secret AD_ADMIN_LOGIN"; exit 1; fi
if [ -z "${{ secrets.AD_ADMIN_SID }}" ]; then echo "ERROR: Missing secret AD_ADMIN_SID"; exit 1; fi
if [ -z "${{ secrets.AD_ADMIN_TENANT_ID }}" ]; then echo "ERROR: Missing secret AD_ADMIN_TENANT_ID"; exit 1; fi


- name: Deploy Bicep template (az cli)
env:
AZURE_RESOURCE_GROUP_NAME: ${{ env.AZURE_RESOURCE_GROUP_NAME }}
run: |
set -euo pipefail
az deployment group create \
--resource-group "$AZURE_RESOURCE_GROUP_NAME" \
--template-file ./infrastructure/main.bicep \
--parameters \
projectName='${{ env.AZURE_WEBAPP_NAME }}' \
sqlAdminPassword='${{ secrets.AZURE_SQL_PASSWORD }}' \
adAdminLogin='${{ secrets.AD_ADMIN_LOGIN }}' \
adAdminSid='${{ secrets.AD_ADMIN_SID }}' \
adAdminTenantId='${{ secrets.AD_ADMIN_TENANT_ID }}'


- name: Restart App Service
run: |
az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP_NAME }}